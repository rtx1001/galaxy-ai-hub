<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-gah.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1115" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Galaxy AI Hub</title>
    <style>
      :root {
        --startup-accent: #a8c7fa;
        --startup-accent-soft: rgba(168, 199, 250, 0.18);
        --startup-accent-glow: rgba(168, 199, 250, 0.24);
      }

      html, body {
        margin: 0;
        min-width: 480px;
        min-height: 100%;
        background: #0f1115;
      }

      body {
        font-family: Inter, Segoe UI, system-ui, sans-serif;
        color: #e3e3e3;
      }

      #root {
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% 40%, var(--startup-accent-soft), transparent 28%),
          linear-gradient(180deg, #131314 0%, #17181a 44%, #101113 100%);
      }

      .startup-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .startup-card {
        width: min(360px, calc(100vw - 48px));
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        background: rgba(30, 31, 32, 0.92);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        padding: 28px 24px 24px;
        text-align: center;
      }

      .startup-logo {
        width: 68px;
        height: 68px;
        border-radius: 18px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        background: #101113;
        border: 1px solid var(--startup-accent-glow);
        box-shadow: 0 0 34px var(--startup-accent-soft);
      }

      .startup-logo img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .startup-kicker {
        color: var(--startup-accent);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .startup-title {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 750;
        letter-spacing: 0;
      }

      .startup-message {
        margin-top: 8px;
        color: #c4c7c5;
        font-size: 13px;
      }

      .startup-bar {
        position: relative;
        overflow: hidden;
        height: 3px;
        margin-top: 22px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .startup-bar::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 38%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, var(--startup-accent), transparent);
        animation: startup-scan 1.25s ease-in-out infinite;
      }

      @keyframes startup-scan {
        from { transform: translateX(-110%); }
        to { transform: translateX(270%); }
      }
    </style>
    <script>
      (() => {
        const swatches = {
          blue: ["#a8c7fa", "rgba(168, 199, 250, 0.18)"],
          green: ["#7bd17a", "rgba(123, 209, 122, 0.18)"],
          lime: ["#d7db63", "rgba(215, 219, 99, 0.18)"],
          gold: ["#f0c531", "rgba(240, 197, 49, 0.18)"],
          orange: ["#f45c3d", "rgba(244, 92, 61, 0.18)"],
          pink: ["#d45aae", "rgba(212, 90, 174, 0.18)"],
          purple: ["#a95de6", "rgba(169, 93, 230, 0.18)"],
        };
        try {
          const id = localStorage.getItem("galaxy.themeSwatchId") || "blue";
          const swatch = swatches[id] || swatches.blue;
          document.documentElement.style.setProperty("--startup-accent", swatch[0]);
          document.documentElement.style.setProperty("--startup-accent-soft", swatch[1]);
          document.documentElement.style.setProperty("--startup-accent-glow", `${swatch[0]}44`);
        } catch {
          // Keep the default accent when storage is unavailable.
        }
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <div class="startup-screen" role="status" aria-live="polite">
        <div class="startup-card">
          <div class="startup-logo">
            <img src="/favicon-gah.png" alt="" aria-hidden="true" />
          </div>
          <div class="startup-kicker">Galaxy AI Hub</div>
          <div class="startup-title">Starting up</div>
          <div class="startup-message">Preparing the assistant workspace...</div>
          <div class="startup-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
